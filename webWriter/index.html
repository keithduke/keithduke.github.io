<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a18" />
  <title>Typewriter</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/paper.css" />
  <link rel="stylesheet" href="css/analyzer.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       TOP BAR (desktop) / status strip
  ════════════════════════════════════════════ -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="app-logo">⌨ Typewriter</span>
      <span class="file-name" id="fileName">untitled.txt</span>
      <span class="file-dirty" id="fileDirty" aria-hidden="true">●</span>
    </div>
    <div class="topbar-right">
      <button class="tb-btn" id="btnNew" title="New document" aria-label="New">New</button>
      <button class="tb-btn" id="btnOpen" title="Open document" aria-label="Open">Open</button>
      <button class="tb-btn tb-btn--primary" id="btnSave" title="Save document" aria-label="Save">Save</button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN STAGE
  ════════════════════════════════════════════ -->
  <main class="stage" id="stage">

    <!-- The Paper -->
    <div class="paper-wrap" id="paperWrap">
      <div class="paper" id="paper">
        <div class="paper-texture" aria-hidden="true"></div>
        <div id="editorMount" class="editor-mount"></div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════
         ANALYZER LENS OVERLAY
    ════════════════════════════════════════ -->
    <div class="analyzer-overlay hidden" id="analyzerOverlay" role="complementary" aria-label="Document analyzer">
      <div class="analyzer-handle" id="analyzerHandle" role="button" tabindex="0" aria-label="Drag to resize analyzer">
        <div class="handle-bar"></div>
      </div>
      <div class="analyzer-inner">

        <div class="analyzer-header">
          <h2 class="analyzer-title">Analysis</h2>
          <div class="analyzer-actions">
            <button class="an-btn an-btn--run" id="btnRunAnalysis">Run Analysis</button>
            <button class="an-btn an-btn--close" id="btnCloseAnalyzer" aria-label="Close analyzer">✕</button>
          </div>
        </div>

        <!-- Stats strip — always visible when panel open -->
        <div class="stats-strip" id="statsStrip">
          <div class="stat-pill">
            <span class="stat-val" id="statWords">—</span>
            <span class="stat-label">words</span>
          </div>
          <div class="stat-pill">
            <span class="stat-val" id="statChars">—</span>
            <span class="stat-label">chars</span>
          </div>
          <div class="stat-pill">
            <span class="stat-val" id="statSentences">—</span>
            <span class="stat-label">sentences</span>
          </div>
          <div class="stat-pill">
            <span class="stat-val" id="statParas">—</span>
            <span class="stat-label">paragraphs</span>
          </div>
          <div class="stat-pill">
            <span class="stat-val" id="statReadTime">—</span>
            <span class="stat-label">min read</span>
          </div>
          <div class="stat-pill">
            <span class="stat-val" id="statFlesch">—</span>
            <span class="stat-label">readability</span>
          </div>
        </div>

        <!-- Issue tabs -->
        <div class="issue-tabs" role="tablist">
          <button class="issue-tab active" role="tab" data-tab="spelling" aria-selected="true">
            Spelling <span class="issue-badge" id="badgeSpelling">0</span>
          </button>
          <button class="issue-tab" role="tab" data-tab="grammar" aria-selected="false">
            Grammar <span class="issue-badge" id="badgeGrammar">0</span>
          </button>
          <button class="issue-tab" role="tab" data-tab="style" aria-selected="false">
            Style <span class="issue-badge" id="badgeStyle">0</span>
          </button>
        </div>

        <!-- Issue list -->
        <div class="issue-list" id="issueList" role="tabpanel">
          <div class="issue-empty" id="issueEmpty">
            <span>Run analysis to check your document.</span>
          </div>
        </div>

      </div>
    </div>

  </main>

  <!-- ═══════════════════════════════════════════
       BOTTOM BAR (mobile-primary, also desktop)
  ════════════════════════════════════════════ -->
  <nav class="bottombar" role="toolbar" aria-label="Document tools">
    <button class="bb-btn" id="bbNew" aria-label="New document">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <span>New</span>
    </button>
    <button class="bb-btn" id="bbOpen" aria-label="Open document">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      <span>Open</span>
    </button>
    <button class="bb-btn" id="bbSave" aria-label="Save document">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span>Save</span>
    </button>
    <button class="bb-btn bb-btn--analyze" id="bbAnalyze" aria-label="Open analyzer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>
      <span>Analyze</span>
    </button>
  </nav>

  <!-- ═══════════════════════════════════════════
       MODALS
  ════════════════════════════════════════════ -->

  <!-- New document confirmation -->
  <div class="modal-backdrop hidden" id="modalNew" role="dialog" aria-modal="true" aria-labelledby="modalNewTitle">
    <div class="modal">
      <h3 id="modalNewTitle">Start a new document?</h3>
      <p>Unsaved changes will be lost.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn--cancel" id="modalNewCancel">Cancel</button>
        <button class="modal-btn modal-btn--confirm" id="modalNewConfirm">New Document</button>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>

  <!-- Hidden file input fallback -->
  <input type="file" id="fileInput" accept=".txt,.md" style="display:none" aria-hidden="true" />

  <!-- ═══════════════════════════════════════════
       SCRIPTS
  ════════════════════════════════════════════ -->
  <!-- Local dependencies (pinned and offline-capable) -->
  <script src="js/vendor/purify.min.js"></script>
  <script type="module" src="js/main.js"></script>

</body>
</html>
